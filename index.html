<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘟嘟成长系统 | DUDU GROWTH SYSTEM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #a855f7;
            --secondary: #06b6d4;
            --accent: #ec4899;
            --dark-bg: #0f0117;
            --card-bg: #1a0f2e;
            --border: #3d2654;
            --success: #4ade80;
            --danger: #f87171;
        }

        body {
            font-family: 'Noto Sans SC', 'Orbitron', monospace;
            background: linear-gradient(135deg, #0f0117 0%, #1a0f2e 50%, #0a0a1a 100%);
            background-attachment: fixed;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: drift 20s ease-in-out infinite;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1600px;
            margin: 0 auto;
            padding: 30px 15px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .language-toggle {
            background: rgba(168, 85, 247, 0.2);
            border: 2px solid var(--primary);
            border-radius: 8px;
            padding: 8px 15px;
            cursor: pointer;
            color: var(--secondary);
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .language-toggle:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            padding: 15px 20px;
            background: rgba(26, 15, 46, 0.8);
            border: 2px solid var(--border);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 18px;
            border: 2px solid transparent;
            background: rgba(168, 85, 247, 0.1);
            color: #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        .card {
            background: rgba(26, 15, 46, 0.9);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 12px 48px rgba(168, 85, 247, 0.2);
        }

        .title {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #999;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (max-width: 1200px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .character-card {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .avatar-circle {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.6),
                        inset 0 0 20px rgba(0, 0, 0, 0.3);
            animation: pulse-glow 2s ease-in-out infinite;
            border: 2px solid var(--secondary);
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.6), inset 0 0 20px rgba(0, 0, 0, 0.3); }
            50% { box-shadow: 0 0 60px rgba(168, 85, 247, 0.9), inset 0 0 30px rgba(0, 0, 0, 0.5); }
        }

        .name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status {
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-big {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary);
            margin: 20px 0;
            font-family: 'Orbitron', monospace;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        .score-label {
            font-size: 0.85rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .mini-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .mini-stat {
            background: rgba(168, 85, 247, 0.1);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .mini-stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 5px;
        }

        .mini-stat-label {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .form-label {
            font-size: 0.85rem;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .form-input, .form-select {
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: #e0e0e0;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }

        .form-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid transparent;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'Noto Sans SC', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 8px 40px rgba(168, 85, 247, 0.5);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(0, 0, 0, 0.3);
            color: #e0e0e0;
            border-color: var(--border);
        }

        .btn-secondary:hover {
            background: rgba(168, 85, 247, 0.1);
            border-color: var(--primary);
        }

        .btn-danger {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
            border-color: #f87171;
        }

        .btn-danger:hover {
            background: #f87171;
            color: white;
            box-shadow: 0 4px 20px rgba(248, 113, 113, 0.3);
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 0.8rem;
        }

        .items-section {
            margin-bottom: 25px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .items-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .items-list::-webkit-scrollbar {
            width: 6px;
        }

        .items-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        .items-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid var(--border);
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s ease;
        }

        .item:hover {
            border-color: var(--primary);
            background: rgba(168, 85, 247, 0.1);
            transform: translateX(5px);
        }

        .item-emoji {
            font-size: 1.8rem;
            flex-shrink: 0;
        }

        .item-content {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .item-time {
            font-size: 0.8rem;
            color: #999;
        }

        .item-value {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--secondary);
            min-width: 50px;
            text-align: right;
            font-family: 'Orbitron', monospace;
        }

        .item-value.positive {
            color: var(--success);
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        .item-value.negative {
            color: var(--danger);
            text-shadow: 0 0 10px rgba(248, 113, 113, 0.5);
        }

        .item-delete {
            width: 32px;
            height: 32px;
            border: 2px solid var(--accent);
            background: rgba(236, 72, 153, 0.1);
            color: var(--accent);
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .item-delete:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.1);
        }

        .attributes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (max-width: 768px) {
            .attributes-grid {
                grid-template-columns: 1fr;
            }
        }

        .attribute {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid var(--border);
            transition: all 0.3s ease;
        }

        .attribute:hover {
            border-color: var(--primary);
            background: rgba(168, 85, 247, 0.1);
        }

        .attr-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .attr-emoji {
            font-size: 1.5rem;
        }

        .attr-name {
            font-weight: 700;
            color: var(--secondary);
            flex: 1;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .attr-level {
            font-weight: 700;
            color: var(--primary);
            font-family: 'Orbitron', monospace;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.6);
            transition: width 0.5s ease;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .reward-card {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .reward-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(168, 85, 247, 0.2);
        }

        .reward-card.luxury {
            border-color: var(--accent);
            background: rgba(236, 72, 153, 0.05);
        }

        .reward-card.luxury::before {
            content: '✨ 豪华 ✨';
            position: absolute;
            top: 10px;
            right: -30px;
            transform: rotate(45deg);
            background: linear-gradient(135deg, var(--accent), #f97316);
            color: white;
            padding: 5px 40px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .reward-emoji {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .reward-name {
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .reward-desc {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 15px;
            min-height: 40px;
        }

        .reward-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
            font-family: 'Orbitron', monospace;
        }

        .reward-btn {
            width: 100%;
            padding: 10px;
            background: rgba(168, 85, 247, 0.2);
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .reward-btn:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        .reward-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
        }

        .achievement {
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .achievement:hover {
            border-color: var(--primary);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }

        .achievement.locked {
            opacity: 0.4;
            filter: grayscale(100%);
        }

        .achievement-emoji {
            font-size: 2rem;
        }

        .achievement-name {
            font-size: 0.7rem;
            color: #999;
            text-align: center;
            line-height: 1.2;
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .hidden {
            display: none !important;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            font-weight: 600;
            animation: slideIn 0.3s ease-out, slideOut 0.3s ease-out 2.7s forwards;
            z-index: 1001;
            box-shadow: 0 8px 32px rgba(168, 85, 247, 0.3);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: rgba(26, 15, 46, 0.95);
            border: 2px solid var(--primary);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.3);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .attr-select {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .attr-option {
            padding: 10px;
            border: 2px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 0.85rem;
            color: #e0e0e0;
        }

        .attr-option:hover {
            border-color: var(--primary);
        }

        .attr-option.selected {
            border-color: var(--primary);
            background: rgba(168, 85, 247, 0.2);
            color: var(--primary);
        }

        .stats-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid var(--border);
        }

        .stat-card-title {
            font-size: 0.9rem;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .stat-card-value {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 10px;
            font-family: 'Orbitron', monospace;
        }

        .stat-card-detail {
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-top">
            <div></div>
            <button class="language-toggle" onclick="toggleLanguage()">🌐 <span id="langToggle">中 / EN</span></button>
        </div>

        <div class="nav">
            <button class="nav-btn active" onclick="switchView('main')"><span class="nav-text" data-zh="📊 主面板" data-en="📊 Dashboard">📊 主面板</span></button>
            <button class="nav-btn" onclick="switchView('attributes')"><span class="nav-text" data-zh="🧬 属性面板" data-en="🧬 Attributes">🧬 属性面板</span></button>
            <button class="nav-btn" onclick="switchView('shop')"><span class="nav-text" data-zh="🛍️ 奖励商城" data-en="🛍️ Shop">🛍️ 奖励商城</span></button>
            <button class="nav-btn" onclick="switchView('achievements')"><span class="nav-text" data-zh="🏆 成就" data-en="🏆 Achievements">🏆 成就</span></button>
        </div>

        <div id="mainView">
            <div style="margin-bottom: 30px;">
                <h1 class="title">⚡ <span data-zh="嘟嘟" data-en="Dudu">嘟嘟</span></h1>
                <p class="subtitle" id="subtitle"><span data-zh="[ 成长系统 v4.0 ]" data-en="[ Growth System v4.0 ]">[ 成长系统 v4.0 ]</span></p>
            </div>

            <div class="main-grid">
                <div class="card">
                    <div class="record-form">
                        <h3 class="section-title" data-zh="📝 记录成长" data-en="📝 Log Activity">📝 记录成长</h3>
                        
                        <div class="form-group">
                            <label class="form-label" data-zh="选择项目" data-en="Select Activity">选择项目</label>
                            <select id="itemSelect" class="form-select" onchange="updateNewItemForm()">
                                <option value="">-- 新增项目 --</option>
                            </select>
                        </div>

                        <div id="newItemGroup" class="hidden">
                            <div class="form-group">
                                <label class="form-label" data-zh="项目名称" data-en="Activity Name">项目名称</label>
                                <input type="text" id="newItemName" class="form-input" placeholder="例：跳舞、运动">
                            </div>
                            <div class="form-group">
                                <label class="form-label" data-zh="表情符号" data-en="Emoji">表情符号</label>

        // 默认奖励
        const defaultRewards = {
            normal: [
                { id: 'r1', name_zh: '瑜伽/冥想', name_en: 'Yoga/Meditation', desc_zh: '30分钟放松身心', desc_en: '30 min relaxation', emoji: '🧘', price: 50 },

                { id: 'r3', name_zh: '看播客/视频', name_en: 'Podcast/Video', desc_zh: '精选内容时间', desc_en: 'Curated content time', emoji: '🎧', price: 40 },
                { id: 'r4', name_zh: '喝奶茶', name_en: 'Bubble Tea', desc_zh: '犒劳自己', desc_en: 'Treat yourself', emoji: '🧋', price: 60 },

                { id: 'r10', name_zh: '玩游戏', name_en: 'Gaming', desc_zh: '尽情游戏时间', desc_en: 'Gaming time', emoji: '🎮', price: 45 },
                { id: 'r11', name_zh: '去美术馆/画廊', name_en: 'Gallery', desc_zh: '艺术鉴赏', desc_en: 'Art appreciation', emoji: '🎨', price: 100 },
                { id: 'r12', name_zh: '去集市', name_en: 'Market', desc_zh: '逛创意市集', desc_en: 'Creative market', emoji: '🎪', price: 80 },
            ],
            luxury: [
                { id: 'l1', name_zh: '看演唱会', name_en: 'Concert', desc_zh: '追星去！', desc_en: 'Follow your stars!', emoji: '🎤', price: 150 },
                { id: 'l2', name_zh: '去餐厅吃饭', name_en: 'Dining', desc_zh: '享受美食', desc_en: 'Fine dining', emoji: '🍽️', price: 120 },
                { id: 'l3', name_zh: '报艺术课程', name_en: 'Art Class', desc_zh: '学习新技能', desc_en: 'Learn new skill', emoji: '🎨', price: 180 },
                { id: 'l4', name_zh: '度假旅行', name_en: 'Vacation', desc_zh: '探索世界', desc_en: 'Explore world', emoji: '✈️', price: 300 },
            ]
        };

        // 成就定义
        const achievements = [
            { id: 'first', name_zh: '初出茅庐', name_en: 'Newcomer', emoji: '🌱', condition: () => data.total >= 10 },
            { id: 'hundred', name_zh: '百积之功', name_en: 'Centenary', emoji: '💯', condition: () => data.total >= 100 },
            { id: 'milestone', name_zh: '里程碑', name_en: 'Milestone', emoji: '🎯', condition: () => data.total >= 500 },
            { id: 'legend', name_zh: '传奇嘟嘟', name_en: 'Legend', emoji: '👑', condition: () => data.total >= 1000 },
            { id: 'dancer', name_zh: '舞蹈小能手', name_en: 'Dancer', emoji: '💃', condition: () => countItem('🎵') >= 10 },
            { id: 'reader', name_zh: '书中自有黄金屋', name_en: 'Reader', emoji: '📖', condition: () => countItem('📚') >= 15 },
            { id: 'athlete', name_zh: '运动达人', name_en: 'Athlete', emoji: '🏃', condition: () => countItem('💪') >= 12 },
            { id: 'creator', name_zh: '内容创作者', name_en: 'Creator', emoji: '📱', condition: () => countItem('📱') >= 5 },
            { id: 'builder', name_zh: 'AI工程师', name_en: 'Builder', emoji: '🛠️', condition: () => countItem('🛠️') >= 3 },
            { id: 'brave', name_zh: '勇敢者', name_en: 'Brave', emoji: '🦁', condition: () => countItem('🚀') >= 5 },
        ];

        let data = loadData();
        let customItems = loadItems();

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (!saved) return { daily: {}, total: 0, coins: 0, level: 1, streak: 0, records: [] };
            return JSON.parse(saved);
        }

        function loadItems() {
            const saved = localStorage.getItem(ITEMS_KEY);
            return saved ? JSON.parse(saved) : defaultItems;
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function saveItems() {
            localStorage.setItem(ITEMS_KEY, JSON.stringify(customItems));
        }

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem(LANG_KEY, currentLang);
            updateLanguage();
        }

        function updateLanguage() {
            // 更新导航文本
            document.querySelectorAll('[data-zh]').forEach(el => {
                const text = el.getAttribute(`data-${currentLang}`);
                if (text) el.textContent = text;
            });

            // 更新placeholder
            const scoreInput = document.getElementById('scoreInput');
            if (scoreInput) {
                scoreInput.placeholder = currentLang === 'zh' ? '留空则用默认值' : 'Leave empty to use default';
            }

            // 更新选择器选项
            renderItems();
            updateUI();
        }

        function getText(key) {
            return i18n[currentLang][key] || key;
        }

        function getItemName(item) {
            const key = currentLang === 'zh' ? 'name_zh' : 'name_en';
            return item[key] || item.name_zh;
        }

        function getRewardText(reward, field) {
            const key = currentLang === 'zh' ? `${field}_zh` : `${field}_en`;
            return reward[key] || reward[`${field}_zh`];
        }

        function getAttrName(attr) {
            const key = currentLang === 'zh' ? 'name_zh' : 'name_en';
            return attr[key] || attr.name_zh;
        }

        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        function getThisWeek() {
            const dates = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                dates.push(d.toISOString().split('T')[0]);
            }
            return dates;
        }

        function updateNewItemForm() {
            const select = document.getElementById('itemSelect').value;
            const newGroup = document.getElementById('newItemGroup');
            if (select === '') {
                newGroup.classList.remove('hidden');
                renderAttrSelect();
            } else {
                newGroup.classList.add('hidden');
            }
        }

        function renderAttrSelect() {
            const container = document.getElementById('attrSelect');
            const html = Object.entries(attributes).map(([key, attr]) => 
                `<div class="attr-option" onclick="selectAttr('${key}', this)" data-attr="${key}">
                    ${attr.emoji} ${getAttrName(attr)}
                </div>`
            ).join('');
            container.innerHTML = html;
        }

        function selectAttr(attr, el) {
            document.querySelectorAll('.attr-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('selectedAttr').value = attr;
        }

        function recordScore() {
            const select = document.getElementById('itemSelect').value;
            const scoreInput = document.getElementById('scoreInput').value;

            if (select === '') {
                const name = document.getElementById('newItemName').value.trim();
                const emoji = document.getElementById('newItemEmoji').value.trim();
                const score = parseFloat(document.getElementById('newItemScore').value);
                const selectedAttr = document.getElementById('selectedAttr')?.value || 'other';

                if (!name || !emoji || !score) {
                    notify(getText('notEnoughInfo'));
                    return;
                }

                customItems[emoji] = { 
                    name_zh: name,
                    name_en: name,
                    score, 
                    emoji,
                    attr: selectedAttr
                };
                saveItems();
                resetForm();
                renderItems();
                notify(`✅ ${getText('addItemSuccess')}「${name}」${getText('success')}`);
                return;
            }

            const item = customItems[select];
            if (!item) return;

            const score = scoreInput === '' ? item.score : parseFloat(scoreInput);
            const today = getToday();

            if (!data.daily[today]) data.daily[today] = [];

            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            data.daily[today].push({ 
                key: select, 
                score, 
                time,
                name: getItemName(item)
            });

            data.total += score;
            data.coins += Math.abs(score);
            data.records.push({ date: today, item: select, score });

            updateLevel();
            saveData();

            document.getElementById('scoreInput').value = '';
            document.getElementById('itemSelect').value = '';
            updateUI();
            notify(`${getText('recordSuccess')} ${score > 0 ? '+' : ''}${score}${getText('success')}`);
        }

        function updateLevel() {
            const levels = [0, 100, 300, 800, 1500, 3000];
            for (let i = levels.length - 1; i >= 0; i--) {
                if (data.total >= levels[i]) {
                    data.level = i + 1;
                    break;
                }
            }
        }

        function countItem(emoji) {
            return data.records.filter(r => r.item === emoji).length;
        }

        function resetForm() {
            document.getElementById('itemSelect').value = '';
            document.getElementById('scoreInput').value = '';
            document.getElementById('newItemName').value = '';
            document.getElementById('newItemEmoji').value = '';
            document.getElementById('newItemScore').value = '';
            document.getElementById('newItemGroup').classList.add('hidden');
        }

        function renderItems() {
            const select = document.getElementById('itemSelect');
            select.innerHTML = `<option value="">${getText('selectNewItem')}</option>`;

            Object.keys(customItems).forEach(key => {
                const item = customItems[key];
                select.innerHTML += `<option value="${key}">${item.emoji} ${getItemName(item)}</option>`;
            });

            updateUI();
        }

        function updateUI() {
            const today = getToday();
            const todayData = data.daily[today] || [];
            const todayScore = todayData.reduce((sum, r) => sum + r.score, 0);

            document.getElementById('todayScore').textContent = todayScore;
            document.getElementById('totalScore').textContent = data.total;
            document.getElementById('coins').textContent = data.coins;
            document.getElementById('level').textContent = data.level;
            document.getElementById('streak').textContent = data.streak || 0;
            document.getElementById('coinsDisplay').textContent = data.coins;

            const todayCoins = todayData.reduce((sum, r) => sum + Math.abs(r.score), 0);
            document.getElementById('dailyCoins').textContent = todayCoins;

            const week = getThisWeek();
            let weeklyCoins = 0;
            week.forEach(date => {
                if (data.daily[date]) {
                    weeklyCoins += data.daily[date].reduce((sum, r) => sum + Math.abs(r.score), 0);
                }
            });
            document.getElementById('weeklyCoins').textContent = weeklyCoins;

            const statuses_zh = ['初心者', '小有成就', '持续进步', '砥砺奋进', '势不可挡', '传奇嘟嘟'];
            const statuses_en = ['Beginner', 'Achiever', 'Growing', 'Advancing', 'Unstoppable', 'Legend'];
            const avatars = ['✨', '⭐', '🌟', '💫', '👑', '👸'];
            
            const idx = Math.min(data.level - 1, statuses_zh.length - 1);
            const status = currentLang === 'zh' ? statuses_zh[idx] : statuses_en[idx];
            document.getElementById('characterStatus').textContent = status;
            document.getElementById('avatar').textContent = avatars[idx];

            updateTodayItems(todayData);
            updateAttributesPanel();
            updateAchievements();
        }

        function updateTodayItems(todayData) {
            const container = document.getElementById('todayItems');
            if (todayData.length === 0) {
                container.innerHTML = `<div class="empty">${getText('noRecords')}</div>`;
                return;
            }

            container.innerHTML = todayData.map((record, idx) => {
                const item = customItems[record.key];
                if (!item) return '';
                const isPositive = record.score > 0;
                return `
                    <div class="item">
                        <div class="item-emoji">${item.emoji}</div>
                        <div class="item-content">
                            <div class="item-name">${getItemName(item)}</div>
                            <div class="item-time">${record.time}</div>
                        </div>
                        <div class="item-value ${isPositive ? 'positive' : 'negative'}">${record.score > 0 ? '+' : ''}${record.score}</div>
                        <button class="item-delete" onclick="deleteTodayRecord(${idx})">×</button>
                    </div>
                `;
            }).join('');
        }

        function deleteTodayRecord(idx) {
            const today = getToday();
            if (data.daily[today]) {
                const record = data.daily[today][idx];
                data.total -= record.score;
                data.coins -= Math.abs(record.score);
                data.daily[today].splice(idx, 1);
                saveData();
                updateUI();
            }
        }

        function updateAttributesPanel() {
            const container = document.getElementById('attributesGrid');
            const attrValues = {};

            Object.keys(attributes).forEach(key => attrValues[key] = 0);

            data.records.forEach(record => {
                const item = customItems[record.item];
                if (item && item.attr && record.score > 0) {
                    attrValues[item.attr] = (attrValues[item.attr] || 0) + record.score;
                }
            });

            const html = Object.entries(attributes).map(([key, attr]) => {
                const value = attrValues[key] || 0;
                const level = Math.floor(value / 50) + 1;
                const progress = (value % 50) / 50 * 100;
                const pointsText = currentLang === 'zh' ? `${value}点` : `${value} pts`;
                return `
                    <div class="attribute">
                        <div class="attr-header">
                            <div class="attr-emoji">${attr.emoji}</div>
                            <div class="attr-name">${getAttrName(attr)}</div>
                            <div class="attr-level">Lv.${level}</div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%;"></div>
                        </div>
                        <div style="font-size: 0.75rem; color: #999; margin-top: 8px;">${pointsText}</div>
                    </div>
                `;
            }).join('');
            container.innerHTML = html;
        }

        function updateAchievements() {
            const container = document.getElementById('achievementsGrid');
            const html = achievements.map(ach => {
                const unlocked = ach.condition();
                const name = currentLang === 'zh' ? ach.name_zh : ach.name_en;
                return `
                    <div class="achievement ${unlocked ? '' : 'locked'}" title="${name}">
                        <div class="achievement-emoji">${ach.emoji}</div>
                        <div class="achievement-name">${name}</div>
                    </div>
                `;
            }).join('');
            container.innerHTML = html;
        }

        function renderShop() {
            const normalHtml = defaultRewards.normal.map(reward => `
                <div class="reward-card">
                    <div class="reward-emoji">${reward.emoji}</div>
                    <div class="reward-name">${getRewardText(reward, 'name')}</div>
                    <div class="reward-desc">${getRewardText(reward, 'desc')}</div>
                    <div class="reward-price">${reward.price} 💎</div>
                    <button class="reward-btn" onclick="buyReward('normal', '${reward.id}')" ${data.coins < reward.price ? 'disabled' : ''}>
                        ${data.coins >= reward.price ? (currentLang === 'zh' ? '兑换' : 'Redeem') : (currentLang === 'zh' ? '积分不足' : 'Insufficient')}
                    </button>
                </div>
            `).join('');

            const luxuryHtml = defaultRewards.luxury.map(reward => `
                <div class="reward-card luxury">
                    <div class="reward-emoji">${reward.emoji}</div>
                    <div class="reward-name">${getRewardText(reward, 'name')}</div>
                    <div class="reward-desc">${getRewardText(reward, 'desc')}</div>
                    <div class="reward-price">${reward.price} 💎</div>
                    <button class="reward-btn" onclick="buyReward('luxury', '${reward.id}')" ${data.coins < reward.price ? 'disabled' : ''}>
                        ${data.coins >= reward.price ? (currentLang === 'zh' ? '兑换' : 'Redeem') : (currentLang === 'zh' ? '积分不足' : 'Insufficient')}
                    </button>
                </div>
            `).join('');

            document.getElementById('normalShop').innerHTML = normalHtml;
            document.getElementById('luxuryShop').innerHTML = luxuryHtml;
        }

        function buyReward(type, id) {
            let reward;
            if (type === 'normal') reward = defaultRewards.normal.find(r => r.id === id);
            else if (type === 'luxury') reward = defaultRewards.luxury.find(r => r.id === id);

            if (!reward) return;

            if (data.coins >= reward.price) {
                data.coins -= reward.price;
                saveData();
                notify(`🎉 ${getText('success')}「${getRewardText(reward, 'name')}」`);
                renderShop();
                updateUI();
            }
        }

        function switchView(view) {
            document.querySelectorAll('[id$="View"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(view + 'View').classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.nav-btn').classList.add('active');

            if (view === 'shop') renderShop();
        }

        function notify(msg) {
            const el = document.createElement('div');
            el.className = 'notification';
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function clearCoinsModal() {
            const title = currentLang === 'zh' ? '清空积分' : 'Clear Points';
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = `
                <p style="color: #999; margin-bottom: 20px;">${getText('confirmClear')}</p>
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-danger" onclick="clearCoinsConfirm()" style="flex: 1;">${getText('confirmBtn')}</button>
                    <button class="btn btn-secondary" onclick="closeModal()" style="flex: 1;">${getText('cancelBtn')}</button>
                </div>
            `;
            document.getElementById('modal').classList.remove('hidden');
        }

        function clearCoinsConfirm() {
            data.coins = 0;
            saveData();
            closeModal();
            updateUI();
            notify(getText('cleared'));
        }

        // 初始化
        const input = document.createElement('input');
        input.id = 'selectedAttr';
        input.type = 'hidden';
        input.value = 'other';
        document.body.appendChild(input);

        // 初始更新语言
        updateLanguage();
    </script>
</body>
</html>
